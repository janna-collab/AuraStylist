services:
  # Nginx Reverse Proxy (Entry point)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - aura-network

  # Backend API (FastAPI)
  backend:
    build: 
      context: ./aurastylist-backend
      dockerfile: Dockerfile
    volumes:
      - ./aurastylist-backend/uploads:/app/uploads
    env_file:
      - ./aurastylist-backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB_NAME=aurastylist
    expose:
      - "8000"
    depends_on:
      - mongodb
    networks:
      - aura-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./aurastylist-frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - aura-network

  # Database (MongoDB)
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - aura-db-data:/data/db
    networks:
      - aura-network

networks:
  aura-network:
    driver: bridge

volumes:
  aura-db-data:
